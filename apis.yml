apis:
  - aid: apinity-io:apinity-io
    name: Apinity.io API
    description: >-
      The Apinity API enables organizations to manage their compliant API
      marketplace programmatically, including API registration, discovery,
      subscription management, and governance policy enforcement across
      partner ecosystems.
    humanURL: https://apinity.io/
